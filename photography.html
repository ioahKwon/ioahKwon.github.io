<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Photography · Joonwoo Kwon</title>
  <meta name="author" content="Joonwoo Kwon">
  <link rel="shortcut icon" href="image/icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css?family=Fira+Sans:300,400,500,600,700" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --fg:        #111;
      --fg-muted:  #555;
      --fg-faint:  #828282;
      --bg:        #fdfdfd;
      --bg-alt:    #f5f7fa;
      --link:      #2a7ae2;
      --link-hi:   #111;
      --rule:      #e8e8e8;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font: 400 16px/1.5 "Fira Sans", -apple-system, BlinkMacSystemFont,
            "Segoe UI", "Segoe UI Symbol", "Segoe UI Emoji",
            "Apple Color Emoji", Roboto, Helvetica, Arial, sans-serif;
      font-feature-settings: "kern" 1;
      font-kerning: normal;
      -webkit-text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-wrap: break-word;
    }

    a {
      color: var(--link);
      text-decoration: none;
    }
    a:hover { color: var(--link-hi); text-decoration: underline; }

    /* ---------- Site header (matches index.html / studio.html) ---------- */
    .site-header {
      border-top: 5px solid #424242;
      border-bottom: 1px solid var(--rule);
      min-height: 56px;
      line-height: 56px;
    }
    .site-header-inner {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .site-title {
      font-size: 1.625rem;
      font-weight: 300;
      letter-spacing: -1px;
      color: #424242;
    }
    .site-title:hover { text-decoration: none; color: #424242; }
    .site-nav a {
      margin-left: 20px;
      color: #111;
      font-size: 1rem;
    }
    .site-nav a:first-child { margin-left: 0; }
    .site-nav a:hover { color: var(--link); text-decoration: underline; }
    .site-nav a.active { color: var(--link); }

    /* ---------- Page header ---------- */
    .page-header {
      max-width: 880px;
      margin: 0 auto;
      padding: 36px 20px 20px;
    }
    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      color: var(--fg);
      margin-bottom: 8px;
    }
    .page-header .lede {
      font-size: 1rem;
      color: var(--fg-muted);
      line-height: 1.6;
      max-width: 640px;
    }

    /* ---------- Filter bar ---------- */
    .filter-bar {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 20px 24px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      font-size: 0.875rem;
      color: var(--fg-faint);
      border-bottom: 1px solid var(--rule);
    }
    .filter-bar button {
      background: none;
      border: none;
      color: var(--fg-faint);
      cursor: pointer;
      padding: 4px 0;
      font-family: inherit;
      font-size: inherit;
      transition: color 0.2s;
    }
    .filter-bar button:hover { color: var(--fg); }
    .filter-bar button.active {
      color: var(--link);
      font-weight: 500;
    }

    /* ---------- Masonry gallery ---------- */
    .gallery {
      max-width: 880px;
      margin: 28px auto 0;
      padding: 0 20px 60px;
      column-count: 3;
      column-gap: 14px;
    }
    @media (max-width: 700px) { .gallery { column-count: 2; } }
    @media (max-width: 480px) { .gallery { column-count: 1; } }

    .photo {
      break-inside: avoid;
      margin-bottom: 14px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border: 1px solid var(--rule);
      background: var(--bg-alt);
      transition: transform 0.4s cubic-bezier(0.2, 0.7, 0.2, 1),
                  box-shadow 0.4s ease;
      opacity: 0;
      transform: translateY(16px);
    }
    .photo.in {
      opacity: 1;
      transform: translateY(0);
    }
    .photo img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    .photo:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.10);
    }
    .photo:hover img { transform: scale(1.03); }

    .photo.hide { display: none; }

    /* ---------- Lightbox (kept dark for full-screen viewing) ---------- */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 12, 0.97);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .lightbox.open {
      opacity: 1;
      pointer-events: auto;
    }
    .lightbox img {
      max-width: 92vw;
      max-height: 84vh;
      object-fit: contain;
      animation: lightbox-in 0.4s cubic-bezier(0.2, 0.7, 0.2, 1);
    }
    @keyframes lightbox-in {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    .lightbox .lb-close {
      position: absolute;
      top: 24px; right: 28px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.35);
      color: rgba(255, 255, 255, 0.85);
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s, transform 0.25s;
    }
    .lightbox .lb-close:hover {
      border-color: #fff;
      color: #fff;
      transform: rotate(90deg);
    }
    .lightbox .lb-counter {
      position: absolute;
      top: 28px; left: 28px;
      font-size: 0.8125rem;
      color: rgba(255, 255, 255, 0.55);
    }
    .lightbox .lb-prev,
    .lightbox .lb-next {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.65);
      font-size: 32px;
      cursor: pointer;
      padding: 18px 22px;
      transition: color 0.25s;
    }
    .lightbox .lb-prev { left: 16px; }
    .lightbox .lb-next { right: 16px; }
    .lightbox .lb-prev:hover,
    .lightbox .lb-next:hover { color: #fff; }

    /* ---------- Site footer (matches index.html) ---------- */
    .site-footer {
      border-top: 1px solid var(--rule);
      margin-top: 40px;
      padding: 36px 0 48px;
      font-size: 0.9375rem;
      color: var(--fg-faint);
    }
    .site-footer .wrapper {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .site-footer ul.contact-list {
      list-style: none;
      padding: 0;
    }
    .site-footer ul.contact-list li {
      line-height: 1.6;
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 700px) {
      html { font-size: 15px; }
      .site-header { line-height: 1.4; min-height: 0; padding: 12px 0; }
      .site-header-inner { gap: 8px; }
      .site-title { font-size: 1.4rem; }
      .site-nav { margin-top: 4px; }
      .site-nav a { margin-left: 14px; font-size: 0.9375rem; }
      .site-nav a:first-child { margin-left: 0; }
      .page-header { padding: 24px 16px 16px; }
      .page-header h1 { font-size: 1.5rem; }
      .filter-bar { padding: 0 16px 18px; gap: 14px; font-size: 0.8125rem; }
      .gallery { padding: 0 16px 40px; margin-top: 20px; column-gap: 10px; }
      .photo { margin-bottom: 10px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <a class="site-title" href="index.html">Joonwoo Kwon</a>
    <nav class="site-nav">
      <a href="index.html">About</a>
      <a href="studio.html">Studio</a>
      <a href="photography.html" class="active">Photography</a>
    </nav>
  </div>
</header>

<header class="page-header">
  <h1>Photography</h1>
  <p class="lede">A slow archive of moments. Light catching a wave, a city at dusk, fragments of places I've passed through.</p>
</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close" aria-label="Close">×</button>
  <button class="lb-prev"  id="lb-prev"  aria-label="Previous">‹</button>
  <button class="lb-next"  id="lb-next"  aria-label="Next">›</button>
  <div class="lb-counter" id="lb-counter">01 / 09</div>
  <img id="lb-img" src="" alt="">
</div>

<footer class="site-footer">
  <div class="wrapper">
    <ul class="contact-list">
      <li>Joonwoo Kwon</li>
      <li>PhD Student, Computer Science, Michigan State University</li>
    </ul>
  </div>
</footer>

<script>
(function () {
  const galleryEl = document.getElementById('gallery');
  if (!galleryEl) return;

  const cacheBust = Math.floor(Date.now() / 60000);
  fetch('image/photography/manifest.json?v=' + cacheBust)
    .then(r => {
      if (!r.ok) throw new Error('manifest not found');
      return r.json();
    })
    .then(data => init(data.photos || []))
    .catch(err => {
      console.warn('[photography] manifest load failed:', err);
      init([]);
    });

  function init(filenames) {
    if (!filenames.length) return;

    filenames.forEach(name => {
      const div = document.createElement('div');
      div.className = 'photo';
      const img = document.createElement('img');
      img.src = 'image/photography/' + name;
      img.alt = '';
      img.loading = 'lazy';
      div.appendChild(img);
      galleryEl.appendChild(div);
    });

    // Fisher-Yates shuffle
    const items = Array.from(galleryEl.children);
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    galleryEl.innerHTML = '';
    items.forEach(el => galleryEl.appendChild(el));

    const photos = items;

    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -6% 0px' });
      photos.forEach(p => io.observe(p));
    } else {
      photos.forEach(p => p.classList.add('in'));
    }

    const lb        = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    const lbClose   = document.getElementById('lb-close');
    const lbPrev    = document.getElementById('lb-prev');
    const lbNext    = document.getElementById('lb-next');

    let currentIdx = -1;
    function openLightbox(idx) {
      if (idx < 0 || idx >= photos.length) return;
      currentIdx = idx;
      const p = photos[idx];
      const img = p.querySelector('img');
      lbImg.src = img.src;
      lbCounter.textContent =
        String(idx + 1).padStart(2, '0') + ' / ' +
        String(photos.length).padStart(2, '0');
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
      currentIdx = -1;
    }
    function step(delta) {
      if (!photos.length) return;
      const next = (currentIdx + delta + photos.length) % photos.length;
      openLightbox(next);
    }

    photos.forEach((p, i) => {
      p.addEventListener('click', () => openLightbox(photos.indexOf(p)));
    });
    lbClose.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => step(-1));
    lbNext.addEventListener('click', () => step(1));
    lb.addEventListener('click', (e) => {
      if (e.target === lb) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape')    closeLightbox();
      if (e.key === 'ArrowLeft') step(-1);
      if (e.key === 'ArrowRight') step(1);
    });
  }
})();
</script>

</body>
</html>
