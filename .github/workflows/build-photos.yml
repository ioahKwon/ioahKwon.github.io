name: Build Photography Manifest

# Whenever a commit touches the photo folder, regenerate manifest.json
# so the gallery on photography.html always reflects the current files.
on:
  push:
    branches: [main, master]
    paths:
      - 'image/photography/**'
      - 'build_photos.py'
      - '.github/workflows/build-photos.yml'
  workflow_dispatch:        # also allow manual runs from the Actions tab

permissions:
  contents: write           # we need to push the regenerated manifest back

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN with write permission so the
          # follow-up commit can push back to the same branch.
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run build_photos.py
        run: python3 build_photos.py

      - name: Commit and push manifest if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- image/photography/manifest.json; then
            echo "manifest.json unchanged — nothing to commit"
            exit 0
          fi
          git add image/photography/manifest.json
          git commit -m "chore: refresh photography manifest [skip ci]"
          git push
